<div class="w-full max-w-md space-y-12 relative">
<div class="flex flex-col items-center space-y-8">

<form class="space-y-6">
<div class="space-y-4">
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">

</div>

</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-lg" data-icon="lock">lock</span>
</div>
<input class="w-full h-[52px] pl-12 pr-12 bg-surface-container-low border-b-2 border-primary/20 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:bg-surface-container transition-all font-body" placeholder="Contraseña" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full h-[56px] copper-gradient text-on-primary font-headline font-bold text-lg tracking-widest uppercase rounded-DEFAULT shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all active:scale-[0.98]" type="submit">

</div>

</button>
<div class="pt-4 flex flex-col items-center space-y-6">
